<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>รายการสั่งซื้อสินค้าจีน · Oversea PenGate</title>
<link rel="icon" href="/logo.png?v=2" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet"/>
<style>
:root{
  --brand:#9C8654;--brand-600:#7C6739;--brand-700:#63522C;--brand-50:#F6F0E1;--brand-100:#E7DBC0;
  --ink:#3C3526;--ink-soft:#7C715B;--ink-xsoft:#B0A48C;--bg:#FAF6EE;--surface:#FFFFFF;--border:#ECE2CE;--border-soft:#F0E9D8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh}
a{color:inherit;text-decoration:none}
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,249,244,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 20px;height:64px}
.topbar .logo{width:46px;height:46px;background:url('/logo.png?v=2') no-repeat center/contain;flex-shrink:0}
.topbar .tt{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:20px;color:var(--brand-600);flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--border);background:#fff;border-radius:999px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink)}
.btn:hover{border-color:var(--brand);color:var(--brand-600)}
.wrap{max-width:1240px;margin:0 auto;padding:22px 16px 70px}
h1{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:18px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{background:linear-gradient(135deg,#B89865,#7C6739);border-radius:14px;padding:16px 18px;color:#fff;position:relative;overflow:hidden;box-shadow:0 4px 14px rgba(124,103,57,.3)}
.stat .n{font-size:30px;font-weight:700;line-height:1}
.stat .l{font-size:13px;font-weight:600;margin-top:4px}
.stat .ic{position:absolute;right:10px;bottom:8px;font-size:34px;opacity:.45}
.stat[data-i]{cursor:pointer;transition:.15s}
.stat[data-i]:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,103,57,.4)}
.stat.active{outline:3px solid #F5B301;outline-offset:1px;box-shadow:0 6px 22px rgba(124,103,57,.5)}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;box-shadow:0 2px 10px rgba(124,103,57,.07);overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;color:var(--brand-700)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:var(--brand-50);color:var(--ink-soft);font-weight:600;padding:10px 8px;text-align:center;white-space:nowrap}
tbody td{padding:10px 8px;border-bottom:1px solid var(--border-soft);text-align:center;white-space:nowrap}
tbody tr:hover{background:var(--brand-50)}
.po-link{color:var(--brand-700);font-weight:700;text-decoration:underline;cursor:pointer}
.x{color:#dc2626;font-weight:700}.ok{color:#16a34a;font-weight:700}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600}
.pill::before{content:"●";color:#F5B301}
.loading,.empty{text-align:center;padding:60px;color:var(--ink-soft)}

/* ── SIDEBAR ── */
.sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:#3C2A0E;color:#cfd8de;display:flex;flex-direction:column;z-index:60;overflow-y:auto;transition:transform .25s}
.sb-prof{display:flex;flex-direction:column;align-items:center;gap:8px;padding:22px 16px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-prof img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--brand)}
.sb-prof .nm{font-weight:600;font-size:14px;color:#fff;text-align:center;word-break:break-word}
.sb-prof .em{font-size:11.5px;color:#8b97a0;text-align:center;word-break:break-all}
.sb-nav{padding:10px 0;flex:1}
.sb-nav a{display:flex;align-items:center;gap:11px;padding:12px 20px;font-size:14px;color:#cfd8de;border-left:3px solid transparent;transition:.12s}
.sb-nav a:hover{background:rgba(255,255,255,.05);color:#fff}
.sb-nav a.active{background:rgba(0,0,0,.25);color:#fff;border-left-color:var(--brand);font-weight:600}
.sb-nav a.sub{padding-left:46px;font-size:13px;color:#9aa6ae}
.sb-nav a.sub.active{color:#fff}
.sb-nav .ic{width:18px;text-align:center;font-size:15px}
.main{margin-left:240px}
.ytop{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:linear-gradient(90deg,#B89865,#9C8654);padding:10px 18px;position:sticky;top:0;z-index:40}
.ytop .brand{display:flex;flex-direction:column;line-height:1;margin-right:6px}
.ytop .brand .b1{font-family:'Playfair Display',serif;font-weight:700;letter-spacing:2px;color:#fff;font-size:18px}
.ytop .brand .b2{font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.7)}
.ytop .ysearch{flex:1;min-width:160px;background:#fff;border-radius:8px;padding:9px 14px;color:#9a8a66;font-size:13.5px}
.ytop .ybtn{background:rgba(255,255,255,.25);color:#fff;border:0;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.ytop .ybtn:hover{background:rgba(255,255,255,.45)}
.ytop .yuser{color:#fff;font-weight:600;font-size:13.5px}
@media(max-width:760px){.ytop .ysearch{display:none}.ytop .yuser{display:none}}
#navToggle{display:none;position:fixed;top:12px;left:12px;z-index:70;background:#3C2A0E;color:#fff;border:0;border-radius:8px;width:42px;height:42px;font-size:20px;cursor:pointer}
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55}
@media(max-width:760px){.wrap{padding:16px 8px 60px}table{font-size:11.5px}
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:none}.main{margin-left:0;padding-top:54px}
  #navToggle{display:block}.sidebar.open ~ .sb-backdrop{display:block}}
</style>
<style id="numFont">
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap');
.order-no,.po-no,.po-link,.no,.ono-box .no,.stat .n,.val,.detail-row .v,.price-cell,.credit,.tot,.lines .tot,.summary .v,.totals .v,.ytop .credit,.sb-prof .cr,.amt,.amount,.mo-card .no,.date-cell,.items-count{font-family:'IBM Plex Mono',ui-monospace,'IBM Plex Sans Thai',monospace !important;font-style:normal !important;font-variant-numeric:tabular-nums}
body{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<button id="navToggle" aria-label="เมนู">☰</button>
<aside class="sidebar" id="sidebar">
  <div class="sb-prof">
    <img id="sbPic" src="/logo.png?v=2" alt=""/>
    <div class="nm" id="sbName">ผู้ใช้</div>
    <div class="em" id="sbCredit" style="color:#F5B301;font-weight:600">💰 0.00 ฿</div>
  </div>
  <nav class="sb-nav">
    <a href="/"><span class="ic">🏠</span> หน้าหลัก</a>
    <a href="/topup.html"><span class="ic">💳</span> การเงิน (เติมเงิน)</a>
    <a href="/orders.html" class="active"><span class="ic">📄</span> รายการสั่งซื้อสินค้าจีน</a>
    <a href="/bills.html"><span class="ic">🧾</span> รายการบิลค่าขนส่ง</a>
    <a href="/orders.html" class="sub active">▸ รายการสั่งซื้อ</a>
    <a href="/track-list.html"><span class="ic">🚚</span> ติดตามสถานะสินค้า</a>
    <a href="/reviews.html"><span class="ic">⭐</span> รีวิว</a>
    <a href="/#order"><span class="ic">➕</span> สั่งซื้อใหม่</a>
  </nav>
</aside>
<div class="sb-backdrop" id="sbBackdrop"></div>

<main class="main">
<div class="ytop">
  <a href="/" class="brand"><span class="b1">OVERSEA</span><span class="b2">pengate</span></a>
  <a href="/#order" class="ysearch">🔍 วางลิงก์สินค้าจากเว็บไซต์จีน…</a>
  <a href="/#order" class="ybtn">＋ แบบฟอร์มเพิ่มสินค้า</a>
  <a href="/cart.html" class="ybtn" id="cartBtn">🛒 ตะกร้า (0)</a>
  <span class="yuser" id="yuser">ผู้ใช้</span>
  <button class="ybtn" id="logoutBtn" type="button">⏻ ออกจากระบบ</button>
</div>
<div class="wrap">
  <h1>📋 รายการสั่งซื้อสินค้าจีน</h1>
  <div class="stats" id="stats"></div>
  <div class="card">
    <div class="card-head" id="listHead">รายการทั้งหมด</div>
    <div id="listBody"><div class="loading">กำลังโหลด…</div></div>
  </div>
</div>
</main>

<script>
let RMB_RATE = 5.2;
async function loadRate(){
  try{ const r=await fetch('/api/orders?rate=1'); const d=await r.json(); if(d?.ok) RMB_RATE=Number(d.rate||d.payRate)||RMB_RATE; }catch(e){}
}
const $ = (s)=>document.querySelector(s);
const esc=(s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=(n)=>Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
function fmtDate(iso){ if(!iso) return '-'; const d=new Date(iso); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function pick(note,key){ const m=(note||'').split('·').map(s=>s.trim()).find(s=>s.startsWith(key+':')); return m?m.split(':')[1].trim():''; }
function sumRmb(o){ return (o.items||[]).reduce((s,it)=>s+(Number(it.priceRmb)||0)*(Number(it.qty)||1),0); }

const STATUS_TEXT={NEW:'กำลังตรวจสอบ',QUOTED:'รอชำระเงิน',PAID:'รอเลขขนส่งจีน',ORDERED:'รอสินค้าเข้าโกดังจีน',SHIPPED:'กำลังจัดส่ง',DONE:'สั่งซื้อสำเร็จ',CANCELLED:'ยกเลิก'};
const STAT_CARDS=[
  {l:'แบบร่าง',ic:'🛒',f:o=>false},
  {l:'กำลังตรวจสอบ',ic:'🕒',f:o=>o.status==='NEW'},
  {l:'รอชำระเงิน',ic:'💳',f:o=>o.status==='QUOTED'},
  {l:'รอเลขขนส่งจีน',ic:'🚚',f:o=>o.status==='PAID'},
  {l:'รอสินค้าเข้าโกดังจีน',ic:'📄',f:o=>o.status==='ORDERED'},
  {l:'สั่งซื้อสำเร็จ (สินค้าถึงโกดังจีน)',ic:'✅',f:o=>o.status==='DONE'||o.status==='SHIPPED'},
];

/* sidebar: profile + mobile toggle + topbar */
(function initSidebar(){
  const u = JSON.parse(localStorage.getItem('opg_user')||'null');
  if(u){ if(u.picture) $('#sbPic').src=u.picture; $('#sbName').textContent=u.name||'ผู้ใช้'; $('#yuser').textContent=u.name||u.email||'ผู้ใช้';
    fetch(`/api/topup?email=${encodeURIComponent(u.email.toLowerCase())}`).then(r=>r.json()).then(d=>{
      $('#sbCredit').textContent='💰 '+(Number(d.credit)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})+' ฿';
    }).catch(()=>{});
  }
  const sb=$('#sidebar'), bd=$('#sbBackdrop');
  $('#navToggle').addEventListener('click',()=>sb.classList.toggle('open'));
  bd.addEventListener('click',()=>sb.classList.remove('open'));
  try{ const c=JSON.parse(localStorage.getItem('opg_cart')||'[]'); $('#cartBtn').textContent=`🛒 ตะกร้า (${c.length})`; }catch(e){}
  $('#logoutBtn').addEventListener('click',()=>{ localStorage.removeItem('opg_user'); location.href='/'; });
})();

async function load(){
  const user = JSON.parse(localStorage.getItem('opg_user')||'null');
  if(!user || !user.email){
    $('#listBody').innerHTML=`<div class="empty">กรุณาเข้าสู่ระบบก่อน<br><a href="/#order" class="btn" style="margin-top:14px">ไปหน้าเข้าสู่ระบบ</a></div>`;
    $('#stats').innerHTML=STAT_CARDS.map(c=>`<div class="stat"><div class="n">0</div><div class="l">${c.l}</div><div class="ic">${c.ic}</div></div>`).join('');
    return;
  }
  await loadRate();
  try{ const r=await fetch(`/api/orders/user?email=${encodeURIComponent(user.email.toLowerCase())}`); const d=await r.json(); allOrders=(d.ok&&d.orders)?d.orders:[]; }catch(e){}
  /* ออเดอร์ที่ออกบิลแล้ว (เข้า bill flow / ถึงโกดังไทย) ย้ายไปอยู่ "รายการบิลค่าขนส่ง" — ตัดออกจากลิสต์นี้
     ออเดอร์ฝากจ่ายเงิน (OVE, source='pay') เป็นบริการแยก ไม่เกี่ยวกับการสั่งซื้อสินค้าจีน — ตัดออกด้วย */
  const BILLED = ['REVIEW','AWAIT_PAY','SLIP','PAID','SHIPPED','DELIVERED'];
  allOrders = allOrders.filter(o => o.source !== 'pay' && !BILLED.includes(o.billStatus) && !['TH_WH','DELIVERING','DELIVERED'].includes(o.shipStatus));
  renderStats();
  renderTable();
}

let allOrders=[];
let activeStat=-1;  /* -1 = แสดงทั้งหมด */

function renderStats(){
  $('#stats').innerHTML = STAT_CARDS.map((c,i)=>{
    const inner=`<div class="n">${allOrders.filter(c.f).length}</div><div class="l">${c.l}</div><div class="ic">${c.ic}</div>`;
    return `<div class="stat${i===activeStat?' active':''}" data-i="${i}">${inner}</div>`;
  }).join('');
  document.querySelectorAll('.stat[data-i]').forEach(el=>el.addEventListener('click',()=>{
    const i=Number(el.dataset.i);
    activeStat = (activeStat===i) ? -1 : i;   /* กดซ้ำ = ยกเลิกตัวกรอง */
    renderStats(); renderTable();
  }));
}

function renderTable(){
  const list = activeStat>=0 ? allOrders.filter(STAT_CARDS[activeStat].f) : allOrders;
  const label = activeStat>=0 ? STAT_CARDS[activeStat].l : 'รายการทั้งหมด';
  $('#listHead').textContent = `${label} (${list.length})`;

  if(!list.length){ $('#listBody').innerHTML=`<div class="empty">${activeStat>=0?'ไม่มีรายการในสถานะนี้':'ยังไม่มีรายการสั่งซื้อ — <a href="/#order" class="po-link">เริ่มสั่งซื้อ</a>'}</div>`; return; }

  const rows = list.map(o=>{
    const rmb=sumRmb(o);
    const poE=!!o.shipMethod;
    const ship=o.shipMethod||pick(o.note,'จัดส่ง')||'-';
    const crate=poE?!!o.crate:pick(o.note,'ตีลังไม้')==='ตีลังไม้';
    const qc=poE?!!o.qc:pick(o.note,'QC')==='ต้องการ';
    const total=Number(o.total)||0, shipFee=Number(o.shipping)||0, billFee=Number(o.billFee)||0, disc=Number(o.discount)||0;
    const thb=total||rmb*RMB_RATE;
    const grand=total+shipFee+billFee-disc;
    return `<tr>
      <td>${fmtDate(o.createdAt)}</td>
      <td><a class="po-link" href="po.html?no=${encodeURIComponent(o.orderNo)}">${esc(o.orderNo)}</a></td>
      <td>${esc(ship)}</td>
      <td>${crate?'<span class="ok">✔</span>':'<span class="x">✘</span>'}</td>
      <td>${qc?'<span class="ok">✔</span>':'<span class="x">✘</span>'}</td>
      <td>${fmt(billFee)}</td>
      <td>${(o.items||[]).length}</td>
      <td>${fmt(shipFee)}</td>
      <td>${fmt(rmb)}</td>
      <td>${fmt(thb)}</td>
      <td>${fmt(disc)}</td>
      <td>${fmt(grand)}</td>
      <td><span class="pill">${esc(STATUS_TEXT[o.status]||o.statusText||o.status)}</span></td>
    </tr>`;
  }).join('');
  $('#listBody').innerHTML = `<div style="overflow-x:auto"><table>
    <thead><tr>
      <th>วันที่ทำรายการ</th><th>เลขที่สั่งซื้อ</th><th>การจัดส่ง</th><th>ตีลังไม้</th><th>QC</th>
      <th>ค่าบริการเปิดบิล</th><th>จำนวนรายการ</th><th>ค่าจัดส่ง (THB)</th><th>ราคาสุทธิ (RMB)</th>
      <th>ราคาสุทธิ (THB)</th><th>ส่วนลด (THB)</th><th>ยอดชำระ (THB)</th><th>สถานะ</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}
load();
</script>
</body>
</html>
