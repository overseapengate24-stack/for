<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ใบสั่งซื้อ PO · Oversea PenGate</title>
<link rel="icon" href="/logo.png?v=2" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet"/>
<style>
:root{
  --brand:#9C8654;--brand-600:#7C6739;--brand-700:#63522C;--brand-50:#F6F0E1;
  --ink:#3C3526;--ink-soft:#7C715B;--ink-xsoft:#B0A48C;--bg:#FAF6EE;--surface:#FFFFFF;--border:#ECE2CE;--border-soft:#F0E9D8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh}
a{color:inherit}
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,249,244,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 20px;height:64px}
.topbar .logo{width:46px;height:46px;background:url('/logo.png?v=2') no-repeat center/contain;flex-shrink:0}
.topbar .tt{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;font-size:20px;color:var(--brand-600);flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--border);background:#fff;border-radius:999px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;color:var(--ink)}
.btn:hover{border-color:var(--brand);color:var(--brand-600)}
.wrap{max-width:1120px;margin:0 auto;padding:22px 16px 70px}
.po-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.po-no{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;color:var(--ink)}
.status{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600}
.status::before{content:"●";color:#F5B301}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 2px 10px rgba(124,103,57,.07);margin-bottom:18px}
.sec-t{font-size:14px;font-weight:700;color:var(--brand-700);margin-bottom:12px}
.meta{display:flex;flex-wrap:wrap;gap:26px}
.meta .col{font-size:13.5px;line-height:1.9}
.meta .k{color:var(--ink-soft);display:inline-block;min-width:96px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--brand-50);color:var(--ink-soft);font-weight:600;padding:10px 8px;text-align:center;white-space:nowrap}
thead th.l{text-align:left}
tbody td{padding:10px 8px;border-bottom:1px solid var(--border-soft);text-align:center;vertical-align:middle}
.shop-row td{background:#FCE9A6;text-align:left;font-weight:700;color:#7a5b00}
.sum-row td{background:#fdf7e3;font-weight:700}
.grand-row td{background:#dff1f4;font-weight:700}
.pimg{width:54px;height:54px;object-fit:cover;border-radius:7px;border:1px solid var(--border)}
.pname{text-align:left;max-width:340px}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:14px}
.summary .s{padding:12px;text-align:center;border-right:1px solid var(--border-soft)}
.summary .s .v{font-size:17px;font-weight:700;color:var(--brand-700)}
.summary .s .k{font-size:12px;color:var(--ink-soft)}
.summary .s .sub{font-size:11px;color:var(--ink-xsoft)}
.loading{text-align:center;padding:70px;color:var(--ink-soft)}
/* ── SIDEBAR ── */
.sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:#3C2A0E;color:#cfd8de;display:flex;flex-direction:column;z-index:60;overflow-y:auto;transition:transform .25s}
.sb-prof{display:flex;flex-direction:column;align-items:center;gap:6px;padding:22px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-prof img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--brand)}
.sb-prof .nm{font-weight:600;font-size:14px;color:#fff;text-align:center;word-break:break-word}
.sb-prof .em{font-size:11.5px;color:#8b97a0;text-align:center;word-break:break-all}
.sb-nav{padding:10px 0;flex:1}
.sb-nav a{display:flex;align-items:center;gap:11px;padding:12px 20px;font-size:14px;color:#cfd8de;border-left:3px solid transparent;text-decoration:none}
.sb-nav a:hover{background:rgba(255,255,255,.05);color:#fff}
.sb-nav a.active{background:rgba(0,0,0,.25);color:#fff;border-left-color:var(--brand);font-weight:600}
.sb-nav a.sub{padding-left:46px;font-size:13px;color:#9aa6ae}
.sb-nav .ic{width:18px;text-align:center}
.main{margin-left:240px}
#navToggle{display:none;position:fixed;top:12px;left:12px;z-index:70;background:#3C2A0E;color:#fff;border:0;border-radius:8px;width:42px;height:42px;font-size:20px;cursor:pointer}
.sb-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55}
@media(max-width:900px){.main{margin-left:0;padding-top:54px}.sidebar{transform:translateX(-100%)}.sidebar.open{transform:none}#navToggle{display:block}.sidebar.open ~ .sb-bd{display:block}}
@media(max-width:680px){.pname{max-width:150px}.meta{gap:14px}}
</style>
<style id="numFont">
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap');
.order-no,.po-no,.po-link,.no,.ono-box .no,.stat .n,.val,.detail-row .v,.price-cell,.credit,.tot,.lines .tot,.summary .v,.totals .v,.ytop .credit,.sb-prof .cr,.amt,.amount,.mo-card .no,.date-cell,.items-count{font-family:'IBM Plex Mono',ui-monospace,'IBM Plex Sans Thai',monospace !important;font-style:normal !important;font-variant-numeric:tabular-nums}
body{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<button id="navToggle" aria-label="เมนู">☰</button>
<aside class="sidebar" id="sidebar">
  <div class="sb-prof">
    <img id="sbPic" src="/logo.png?v=2" alt=""/>
    <div class="nm" id="sbName">ผู้ใช้</div>
    <div class="em" id="sbEmail"></div>
  </div>
  <nav class="sb-nav">
    <a href="/"><span class="ic">🏠</span> หน้าหลัก</a>
    <a href="/topup.html"><span class="ic">💳</span> การเงิน (เติมเงิน)</a>
    <a href="/orders.html"><span class="ic">📄</span> รายการสั่งซื้อสินค้าจีน</a>
    <a href="/bills.html"><span class="ic">🧾</span> รายการบิลค่าขนส่ง</a>
    <a href="/orders.html" class="sub">▸ รายการสั่งซื้อ</a>
    <a href="/track-list.html"><span class="ic">🚚</span> ติดตามสถานะสินค้า</a>
    <a href="/#addresses"><span class="ic">📍</span> ที่อยู่ของฉัน</a>
    <a href="/reviews.html"><span class="ic">⭐</span> รีวิว</a>
    <a href="/#order"><span class="ic">➕</span> สั่งซื้อใหม่</a>
    <a href="/#contact"><span class="ic">📞</span> ติดต่อเรา</a>
  </nav>
</aside>
<div class="sb-bd" id="sbBd"></div>

<main class="main">
<div class="topbar">
  <a href="/" class="logo" aria-label="หน้าหลัก"></a>
  <div class="tt">ใบสั่งซื้อ (PO)</div>
  <a href="/#order" class="btn">＋ สั่งซื้อใหม่</a>
  <a href="/#track" class="btn">ติดตามสถานะ</a>
</div>
<div class="wrap"><div id="po" class="loading">กำลังโหลด…</div></div>
</main>

<script>
let RMB_RATE = 5.2;
async function loadRate(){
  try{
    const r = await fetch('/api/orders?rate=1');
    const d = await r.json();
    if(d?.ok) RMB_RATE = Number(d.rate||d.payRate) || RMB_RATE;
  }catch(e){}
}
const me = JSON.parse(localStorage.getItem('opg_user')||'null');
const $ = (s)=>document.querySelector(s);
/* sidebar */
(function(){
  if(me){ if(me.picture) document.getElementById('sbPic').src=me.picture; document.getElementById('sbName').textContent=me.name||'ผู้ใช้'; document.getElementById('sbEmail').textContent=me.email||''; }
  document.getElementById('navToggle').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
  document.getElementById('sbBd').addEventListener('click',()=>document.getElementById('sidebar').classList.remove('open'));
})();
const esc = (s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=(n)=>Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const qs = new URLSearchParams(location.search);
const no = (qs.get('no')||'').trim().toUpperCase();
function fmtDate(iso){ if(!iso) return '-'; const d=new Date(iso); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
function fmtDateTime(iso){ if(!iso) return '-'; const d=new Date(iso); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function pick(note,key){ const m=(note||'').split('·').map(s=>s.trim()).find(s=>s.startsWith(key+':')); return m?m.split(':')[1].trim():''; }

async function load(){
  if(!no){ $('#po').textContent='ไม่พบเลขออเดอร์'; return; }
  let d=null;
  try{ const r=await fetch(`/api/orders/track?no=${encodeURIComponent(no)}`); d=await r.json(); }catch(e){}
  if(!d || !d.ok || !d.found){ $('#po').textContent='ไม่พบใบสั่งซื้อนี้'; return; }

  await loadRate();

  const items=d.items||[]; const c=d.customer||{};
  const poE=!!d.shipMethod;
  const ship=d.shipMethod||pick(d.note,'จัดส่ง')||'-';
  const crate=((poE?!!d.crate:pick(d.note,'ตีลังไม้')==='ตีลังไม้'))?'ตีลังไม้':'ไม่ตีลังไม้';
  const qc=((poE?!!d.qc:pick(d.note,'QC')==='ต้องการ'))?'ต้องการ':'ไม่ต้องการ';
  const extra=pick(d.note,'หมายเหตุ');
  const totalThb=Number(d.total)||0, shipFee=Number(d.shipping)||0, billFee=Number(d.billFee)||0, disc=Number(d.discount)||0;
  let sumRmb=0, qtyAll=0, rows='', rowIdx=0;
  const groups={}; items.forEach(it=>{ const s=it.shop||'ร้านค้า'; (groups[s]=groups[s]||[]).push(it); });
  const shopLogo=(s)=>{ const k=String(s||'').toLowerCase();
    const m = k.includes('tmall')?'/Tmall.png' : k.includes('1688')?'/1688.jpg' : k.includes('taobao')?'/Taobao.jpg' : '';
    return m?`<img src="${m}" alt="" style="width:18px;height:18px;border-radius:4px;object-fit:contain;vertical-align:middle;margin-right:6px"/>`:'🏪 '; };
  for(const shop in groups){
    rows += `<tr class="shop-row"><td colspan="10">${shopLogo(shop)}${esc(shop)}</td></tr>`;
    groups[shop].forEach(it=>{
      const price=Number(it.priceRmb)||0, qty=Number(it.qty)||1, lineRmb=price*qty; sumRmb+=lineRmb; qtyAll+=qty;
      const meta=[it.color,it.size].filter(Boolean).map(esc).join(' · ');
      rows += `<tr>
        <td>${++rowIdx}</td>
        <td>${esc(shop)}</td>
        <td class="pname"><b>${esc(it.name||'(ไม่มีชื่อ)')}</b>${meta?`<div style="font-size:12px;color:var(--ink-soft)">${meta}</div>`:''}</td>
        <td>${it.imageUrl?`<img class="pimg" src="${esc(it.imageUrl)}"/>`:'📦'}</td>
        <td>${fmt(price)}</td>
        <td>${qty}</td>
        <td>0.00</td>
        <td>${fmt(lineRmb)}</td>
        <td>${fmt(lineRmb*RMB_RATE)}</td>
        <td>${it.url?`<a class="btn" href="${esc(it.url)}" target="_blank" style="padding:5px 9px">↗</a>`:''}</td>
      </tr>`;
    });
  }
  const priceThb = totalThb || sumRmb*RMB_RATE;
  const grandThb = priceThb + shipFee + billFee - disc;

  /* คำนวณวันครบกำหนดชำระ (+7 วันจากวันออกบิล) */
  const due = new Date(d.createdAt||Date.now()); due.setDate(due.getDate()+7);
  const dueTxt = `${String(due.getDate()).padStart(2,'0')}/${String(due.getMonth()+1).padStart(2,'0')}/${due.getFullYear()}`;
  const isQuoted = d.status==='QUOTED' || d.status==='NEW';  /* จ่ายได้เลยตั้งแต่ NEW (ราคาอัตโนมัติจากสินค้า) */

  /* การ์ดติดตามการขนส่ง (4 สถานะ auto) — แสดงเมื่อ ORDERED / SHIPPED */
  const first = items[0]||{};
  const dk='font-size:12px;color:var(--ink-soft)', dv='font-weight:600;font-size:14px';
  const dvm=dv+";font-family:'IBM Plex Mono',monospace";
  const showWh = d.status==='ORDERED' || d.status==='SHIPPED';
  const CN_STAGES=[{ic:'📤',lbl:'ร้านส่งของ'},{ic:'🏬',lbl:'เข้าโกดังจีน'},{ic:'🚛',lbl:'ส่งมาไทย'},{ic:'🏭',lbl:'โกดังไทย'}];
  const cnStage = Number.isInteger(d.cnStage) ? d.cnStage : -1;
  const arrived = cnStage>=1;
  const stepsHtml = CN_STAGES.map((s,i)=>{
    const done=i<=cnStage, now=i===cnStage;
    const bg = now?'#16a34a':(done?'#7C6739':'#fff');
    const col = (now||done)?'#fff':'#B0A48C';
    const bd = (now||done)?'transparent':'2px solid #ECE2CE';
    const ring = now?'box-shadow:0 0 0 4px #bbf7d0;':'';
    return `<div style="flex:1;text-align:center">
      <div style="width:30px;height:30px;border-radius:50%;background:${bg};color:${col};border:${bd};display:grid;place-items:center;margin:0 auto 5px;font-size:13px;${ring}">${done&&!now?'✓':s.ic}</div>
      <div style="font-size:10.5px;color:${done?'#63522C':'#7C715B'};font-weight:${done?'600':'400'}">${s.lbl}</div>
    </div>`;
  }).join('');
  const arrivedTxt = d.cnArrivedAt ? `เข้าโกดังจีนเมื่อ ${fmtDateTime(d.cnArrivedAt)}` : '';
  const HEAD = {
    '-1': ['📦 รอสินค้าเข้าโกดังจีน', 'รอขนส่งจีนรับพัสดุเข้าโกดัง'],
    '0':  ['🚚 ร้านค้าจัดส่งแล้ว', 'พัสดุกำลังเดินทางเข้าโกดังจีน'],
    '1':  ['✅ สินค้าถึงโกดังจีนแล้ว', (arrivedTxt?arrivedTxt+' · ':'')+'กำลังรอรวมตู้ส่งมาไทย'],
    '2':  ['🚛 กำลังขนส่งมาไทย', 'พัสดุออกจากจีนแล้ว กำลังเดินทางเข้าไทย'],
    '3':  ['🏭 ถึงโกดังไทยแล้ว', 'พัสดุถึงโกดังไทย พร้อมจัดส่งถึงคุณ'],
  };
  const [headTxt, subTxt] = HEAD[String(cnStage)] || HEAD['-1'];
  const warehouseCard = showWh ? `
    <div class="card" style="border:2px solid ${arrived?'#16a34a':'var(--brand)'};background:${arrived?'#f0fdf4':'var(--brand-50)'}">
      <div style="font-weight:700;font-size:15px;color:${arrived?'#16a34a':'var(--brand-700)'};margin-bottom:4px">${headTxt}</div>
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:14px">${subTxt}</div>
      <div style="display:flex;gap:4px;margin-bottom:16px">${stepsHtml}</div>
      <div style="border-top:1px solid var(--border-soft);padding-top:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px 28px">
        <div><div style="${dk}">เลข Tracking จีน</div><div style="${dvm}">${esc(d.trackingNo||'-')}</div></div>
        <div><div style="${dk}">ชื่อสินค้า</div><div style="${dv}">${esc(first.name||'-')}</div></div>
        <div><div style="${dk}">น้ำหนักสินค้า (กรัม)</div><div style="${dvm}">${d.weight?Number(d.weight).toLocaleString():'-'}</div></div>
        <div><div style="${dk}">ร้านค้า</div><div style="${dv}">${esc(d.shopName||first.shop||'-')}</div></div>
        <div><div style="${dk}">การจัดส่ง</div><div style="${dv}">${ship==='เรือ'?'🚢 ทางเรือ':(ship==='รถ'?'🚚 ทางรถ':esc(ship))}</div></div>
        <div><div style="${dk}">สี / ขนาด</div><div style="${dv}">${esc([first.color,first.size].filter(Boolean).join(' / ')||'-')}</div></div>
        <div><div style="${dk}">วันที่สั่งซื้อ</div><div style="${dv}">${fmtDateTime(d.createdAt)}</div></div>
        <div><div style="${dk}">หมายเหตุร้านค้า</div><div style="${dv}">${esc(d.shopNote||'-')}</div></div>
        <div><div style="${dk}">จำนวนสินค้า</div><div style="${dv}">${qtyAll} ชิ้น</div></div>
        <div><div style="${dk}">เวลาที่ร้านค้าส่ง</div><div style="${dv}">${d.shopShipAt?fmtDateTime(d.shopShipAt):'-'}</div></div>
      </div>
    </div>` : '';

  /* ดึงเครดิตของลูกค้า */
  let credit = 0;
  if(me && me.email){
    try{ const r=await fetch(`/api/topup?email=${encodeURIComponent(me.email.toLowerCase())}`); const dd=await r.json(); credit=Number(dd.credit)||0; }catch(e){}
  }

  $('#po').className='';
  $('#po').innerHTML = `
    <div class="po-head">
      <div class="po-no">📄 เลขที่ PO : ${esc(d.orderNo)}</div>
      <div style="text-align:right">
        <div class="status">สถานะ: ${esc(d.statusText||'กำลังตรวจสอบ')}</div>
        ${isQuoted?`<div style="color:#dc2626;font-size:12.5px;font-weight:600;margin-top:3px">⚠ ชำระเงินก่อนวันที่ ${dueTxt}</div>`:''}
      </div>
    </div>
    ${warehouseCard}
    <div class="card">
      <div class="sec-t">ผู้ทำรายการ</div>
      <div class="meta">
        <div class="col">
          <div><span class="k">ชื่อลูกค้า</span> ${esc(c.name||'-')}</div>
          <div><span class="k">เบอร์โทร</span> ${esc(c.phone||'-')}</div>
          <div><span class="k">E-mail</span> ${esc(c.email||'-')}</div>
          <div><span class="k">LINE</span> ${esc(c.lineId||'-')}</div>
        </div>
        <div class="col">
          <div><span class="k">วันที่ทำรายการ</span> ${fmtDate(d.createdAt)}</div>
          <div><span class="k">อัตราแลกเปลี่ยน</span> ${RMB_RATE}</div>
        </div>
        <div class="col">
          <div><span class="k">การขนส่ง</span> ${esc(ship)} 🚚</div>
          <div><span class="k">การตีลังไม้</span> ${esc(crate)}</div>
          <div><span class="k">การตรวจ QC</span> ${esc(qc)}</div>
        </div>
      </div>
      ${extra?`<div style="margin-top:10px;font-size:13px;color:var(--ink-soft)"><span class="k">หมายเหตุ</span> ${esc(extra)}</div>`:''}
    </div>

    <div class="card">
      <div class="sec-t">รายการสั่งซื้อ</div>
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th>เลข</th><th class="l">ชื่อร้านค้า</th><th class="l">สินค้า</th><th>รูปสินค้า</th>
          <th>ราคาสินค้า (RMB)</th><th>จำนวน</th><th>ค่าขนส่งจีน (THB)</th><th>รวม (RMB)</th><th>รวม (THB)</th><th>Link</th>
        </tr></thead>
        <tbody>${rows}
          <tr class="grand-row"><td colspan="5" style="text-align:right">รวมทั้งหมด</td><td>${qtyAll}</td><td>0.00 THB</td><td>${fmt(sumRmb)} RMB</td><td>${fmt(grandThb)} THB</td><td></td></tr>
        </tbody>
      </table></div>
      <div class="summary">
        <div class="s"><div class="v">${RMB_RATE}</div><div class="k">เรทสั่งซื้อ</div></div>
        <div class="s"><div class="v">${fmt(billFee)}</div><div class="k">ค่าเปิดบิล (THB)</div></div>
        <div class="s"><div class="v">${qtyAll}</div><div class="k">จำนวนสินค้ารวม</div></div>
        <div class="s"><div class="v">${fmt(disc)}</div><div class="k">ส่วนลด (THB)</div></div>
        <div class="s"><div class="v">${fmt(shipFee)}</div><div class="k">ค่าจัดส่งรวม</div></div>
        <div class="s"><div class="v">${fmt(grandThb)}</div><div class="k">รวมสุทธิ (THB)</div><div class="sub">(${fmt(sumRmb)} RMB)</div></div>
        <div class="s" style="border-right:0"><div class="v">${fmt(grandThb)}</div><div class="k">ยอดชำระ (THB)</div></div>
      </div>
    </div>

    ${d.adminNote?`<div class="card"><div class="sec-t">📝 หมายเหตุจากแอดมิน</div><div style="white-space:pre-wrap;font-size:13.5px">${esc(d.adminNote)}</div></div>`:''}

    ${isQuoted?`
    <div class="card">
      <div class="sec-t">💳 ชำระเงิน</div>
      <table style="width:100%;font-size:13.5px">
        <tr><td style="padding:5px 0;color:var(--ink-soft)">ยอดเงิน:</td><td style="text-align:right;font-weight:600">${fmt(totalThb||sumRmb*RMB_RATE)} THB</td></tr>
        <tr><td style="padding:5px 0;color:var(--ink-soft)">ยอดค่าขนส่ง:</td><td style="text-align:right;font-weight:600">${fmt(shipFee)} THB</td></tr>
        <tr><td style="padding:5px 0;color:var(--ink-soft)">ค่าบริการเปิดบิล:</td><td style="text-align:right;font-weight:600">${fmt(billFee)} THB</td></tr>
        <tr><td style="padding:5px 0;color:#dc2626">ส่วนลด:</td><td style="text-align:right;font-weight:600;color:#dc2626">- ${fmt(disc)} THB</td></tr>
        <tr style="border-top:1px solid var(--border)"><td style="padding:10px 0;font-weight:700">ยอดชำระ:</td><td style="text-align:right;font-weight:700;font-size:18px;color:var(--brand-700)">${fmt(grandThb)} THB</td></tr>
        <tr><td style="padding:5px 0;color:var(--ink-soft)">เครดิตคงเหลือ:</td><td style="text-align:right;font-weight:600;color:#F5B301">${fmt(credit)} THB</td></tr>
      </table>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap">
        <a class="btn" href="/topup.html" style="background:#1d4ed8;color:#fff;border:0">💰 เติมเงิน</a>
        <button class="btn" id="payBtn" style="background:${credit>=grandThb?'#16a34a':'#9ca3af'};color:#fff;border:0" ${credit>=grandThb?'':'disabled'}>💳 ชำระเงิน</button>
      </div>
      ${credit<grandThb?`<div style="text-align:right;font-size:12px;color:#dc2626;margin-top:6px">เครดิตไม่พอ (ขาดอีก ${fmt(grandThb-credit)} ฿)</div>`:''}
    </div>`:''}

    ${!isQuoted?`<div class="card" style="background:var(--brand-50);border-style:dashed">
      <div style="font-size:13.5px;color:var(--ink-soft)">เก็บเลข PO นี้ไว้ตรวจสอบสถานะภายหลังได้ — ทีมงานจะตรวจสอบและแจ้งราคา/ค่าส่งกลับทาง LINE</div>
    </div>`:''}`;

  if(isQuoted && $('#payBtn')){
    $('#payBtn').addEventListener('click', async ()=>{
      if(!confirm(`ชำระเงินออเดอร์ ${d.orderNo} จำนวน ฿${fmt(grandThb)} จากเครดิต?`)) return;
      const btn=$('#payBtn'); btn.disabled=true; btn.textContent='กำลังชำระ…';
      try{
        const r=await fetch(`/api/orders/pay?no=${encodeURIComponent(d.orderNo)}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:me.email.toLowerCase()})});
        const dd=await r.json();
        if(!dd.ok){ if(dd.need){ alert('เครดิตไม่พอ ขาดอีก ฿'+fmt(dd.need)); location.href='/topup.html'; return; } throw new Error(dd.error||'ชำระไม่สำเร็จ'); }
        alert('✅ ชำระเงินสำเร็จ ฿'+fmt(dd.amount));
        location.reload();
      }catch(e){ alert('❌ '+e.message); btn.disabled=false; btn.textContent='💳 ชำระเงิน'; }
    });
  }
}
load();
</script>
</body>
</html>
