<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet"/>
<style>
:root{--brand:#9C8654;--brand-600:#7C6739;--brand-700:#63522C;--brand-50:#F6F0E1;--brand-100:#E7DBC0;--ink:#3C3526;--ink-soft:#7C715B;--bg:#FAF6EE;--border:#ECE2CE}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.top{background:linear-gradient(90deg,#B89865,#9C8654);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.top h1{font-family:'Playfair Display',serif;font-size:20px;color:#fff;flex:1}
.top a{color:#fff;font-size:13px;text-decoration:none;background:rgba(255,255,255,.2);padding:7px 14px;border-radius:999px;font-weight:600}
.wrap{max-width:820px;margin:0 auto;padding:40px 16px}
.card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:48px 24px;text-align:center;box-shadow:0 4px 16px rgba(124,103,57,.08)}
.card .ic{font-size:54px}
.card h2{font-family:'Playfair Display',serif;font-size:26px;color:var(--brand-700);margin:14px 0 8px}
.card p{color:var(--ink-soft);font-size:14px}
</style>
</head>

  </div>
</div>
</body>
</html>
