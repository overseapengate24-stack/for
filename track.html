<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ค้นหาเลขพัสดุ · Oversea PenGate</title>
<link rel="icon" href="/logo.png?v=2" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet"/>
<style>
:root{--brand:#9C8654;--brand-600:#7C6739;--brand-700:#63522C;--brand-50:#F6F0E1;--brand-100:#E7DBC0;--ink:#3C3526;--ink-soft:#7C715B;--ink-xsoft:#B0A48C;--bg:#FAF6EE;--surface:#FFFFFF;--border:#ECE2CE;--border-soft:#F0E9D8;--green:#16a34a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh}
a{color:inherit;text-decoration:none}
.sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:#3C2A0E;color:#cfd8de;display:flex;flex-direction:column;z-index:60;overflow-y:auto;transition:transform .25s}
.sb-prof{display:flex;flex-direction:column;align-items:center;gap:6px;padding:22px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-prof img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--brand)}
.sb-prof .nm{font-weight:600;font-size:14px;color:#fff;text-align:center}
.sb-prof .cr{font-size:12px;color:#F5B301;font-weight:600}
.sb-nav{padding:10px 0;flex:1}
.sb-nav a{display:flex;align-items:center;gap:11px;padding:12px 20px;font-size:14px;color:#cfd8de;border-left:3px solid transparent}
.sb-nav a:hover{background:rgba(255,255,255,.05);color:#fff}
.sb-nav a.active{background:rgba(0,0,0,.25);color:#fff;border-left-color:var(--brand);font-weight:600}
.sb-nav a.sub{padding-left:46px;font-size:13px;color:#9aa6ae}
.sb-nav a.sub.active{color:#fff}
.sb-nav .ic{width:18px;text-align:center}
.main{margin-left:240px}
.ytop{display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,#B89865,#9C8654);padding:10px 18px;position:sticky;top:0;z-index:40}
.ytop h1{font-family:'Playfair Display',serif;font-weight:700;font-size:20px;color:#fff;flex:1}
.crumbs{font-size:12.5px;color:rgba(255,255,255,.85)}
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px 70px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:22px;box-shadow:0 2px 10px rgba(124,103,57,.07)}
.search{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search input{flex:1;min-width:240px;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14.5px;outline:none}
.search input:focus{border-color:var(--brand)}
.search button{background:var(--brand-600);color:#fff;border:0;border-radius:10px;padding:11px 22px;font-family:inherit;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.search button:hover{background:var(--brand-700)}
.alert{display:none;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:10px;padding:10px 14px;font-size:13.5px;margin-top:12px}
.result{margin-top:20px}
.row{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid var(--border-soft)}
.row .k{color:var(--ink-soft)}
.row .v{font-weight:600}
.ship-prog{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px;margin-top:18px}
.ship-steps{display:flex;gap:6px;overflow-x:auto;padding:6px 0 14px;scroll-snap-type:x mandatory}
.ship-step{flex:1;min-width:84px;text-align:center;scroll-snap-align:start}
.ship-step .dot{width:34px;height:34px;border-radius:50%;background:#fff;border:2px solid var(--border);color:var(--ink-xsoft);display:grid;place-items:center;margin:0 auto 5px;font-size:15px;transition:.2s}
.ship-step.on .dot{background:var(--brand-600);border-color:var(--brand-600);color:#fff}
.ship-step.now .dot{background:var(--brand-700);border-color:var(--brand-700);color:#fff;box-shadow:0 0 0 4px var(--brand-100)}
.ship-step .lbl{font-size:11px;color:var(--ink-soft)}
.ship-step.on .lbl{color:var(--brand-700);font-weight:600}
.tl{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.tl .ev{background:var(--brand-50);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px}
.tl .ev .st{font-weight:700;color:var(--brand-700)}
.tl .ev .nt{color:var(--ink-soft);font-size:12px;margin-top:2px}
.tl .ev .at{color:var(--ink-xsoft);font-size:11.5px;margin-top:3px}
.empty-tl{text-align:center;padding:14px;color:var(--ink-soft);font-size:13px}
.empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
#navToggle{display:none;position:fixed;top:12px;left:12px;z-index:70;background:#3C2A0E;color:#fff;border:0;border-radius:8px;width:42px;height:42px;font-size:20px;cursor:pointer}
.sb-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55}
@media(max-width:760px){.main{margin-left:0;padding-top:54px}.sidebar{transform:translateX(-100%)}.sidebar.open{transform:none}#navToggle{display:block}.sidebar.open ~ .sb-bd{display:block}}
</style>
<style id="numFont">
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&display=swap');
.order-no,.po-no,.po-link,.no,.row .v,.ship-step .lbl,.tl .ev .at{font-family:'IBM Plex Mono',ui-monospace,'IBM Plex Sans Thai',monospace !important;font-variant-numeric:tabular-nums}
body{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<button id="navToggle" aria-label="เมนู">☰</button>
<aside class="sidebar" id="sidebar">
  <div class="sb-prof">
    <img id="sbPic" src="/logo.png?v=2" alt=""/>
    <div class="nm" id="sbName">ผู้ใช้</div>
    <div class="cr" id="sbCredit">💰 0.00 ฿</div>
  </div>
  <nav class="sb-nav">
    <a href="/"><span class="ic">🏠</span> หน้าหลัก</a>
    <a href="/topup.html"><span class="ic">💳</span> การเงิน (เติมเงิน)</a>
    <a href="/orders.html"><span class="ic">📄</span> รายการสั่งซื้อสินค้าจีน</a>
    <a href="/bills.html"><span class="ic">🧾</span> รายการบิลค่าขนส่ง</a>
    <a href="/track.html" class="active"><span class="ic">🚚</span> ติดตามสถานะสินค้า</a>
    <a href="/track.html" class="sub active">▸ ค้นหาเลขพัสดุ</a>
    <a href="/#addresses"><span class="ic">📍</span> ที่อยู่ของฉัน</a>
    <a href="/reviews.html"><span class="ic">⭐</span> รีวิว</a>
    <a href="/#order"><span class="ic">➕</span> สั่งซื้อใหม่</a>
  </nav>
</aside>
<div class="sb-bd" id="sbBd"></div>

<main class="main">
  <div class="ytop">
    <h1>ค้นหาเลขพัสดุ</h1>
    <div class="crumbs">🏠 หน้าหลัก › ค้นหาเลขพัสดุ</div>
  </div>
  <div class="wrap">
    <div class="card">
      <div class="search">
        <input type="text" id="tInput" placeholder="ระบุเลขที่ Tracking / เลขออเดอร์"/>
        <button id="tBtn" type="button">🔍 ตรวจสอบ</button>
      </div>
      <div class="alert" id="tAlert"></div>
    </div>
    <div id="result" class="result"></div>
  </div>
</main>

<script src="//www.17track.net/externalcall.js"></script>
<script>
const $=(s)=>document.querySelector(s);
/* ฝัง widget ติดตามขนส่งจีนสดจาก 17track */
function show17track(num){
  num=(num||'').trim();
  if(!num) return;
  $('#result').insertAdjacentHTML('beforeend',
    `<div class="card" style="margin-top:18px"><div style="font-weight:700;color:var(--brand-700);margin-bottom:10px">🌏 สถานะขนส่งจีน (อัปเดตสดจากขนส่ง) — <span style="font-family:'IBM Plex Mono',monospace">${esc(num)}</span></div><div id="YQContainer"></div><div style="font-size:11.5px;color:var(--ink-soft);margin-top:8px">ข้อมูลจาก 17track.net — แสดงเส้นทางพัสดุภายในจีนแบบเรียลไทม์</div></div>`);
  try{ YQV5.trackSingle({YQ_ContainerId:"YQContainer",YQ_Height:560,YQ_Fun:"track",YQ_Num:num}); }
  catch(e){ const c=$('#YQContainer'); if(c) c.innerHTML=`<a href="https://t.17track.net/en#nums=${encodeURIComponent(num)}" target="_blank" style="color:var(--brand-700);text-decoration:underline">เปิดดูสถานะที่ 17track ↗</a>`; }
}
const esc=(s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=(n)=>Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
function fmtDateTime(iso){if(!iso)return '-';const d=new Date(iso);return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
const SHIP_STEPS=['PENDING','CN_WH','CN_OUT','TH_IN','TH_WH','DELIVERING','DELIVERED'];
const SHIP_TEXT={PENDING:'รอจัดส่ง',CN_WH:'เข้าโกดังจีน',CN_OUT:'ออกจากจีน',TH_IN:'ถึงไทย/ศุลกากร',TH_WH:'โกดังไทย',DELIVERING:'กำลังนำส่ง',DELIVERED:'จัดส่งสำเร็จ'};
const SHIP_ICON={PENDING:'🕓',CN_WH:'🏭',CN_OUT:'✈️',TH_IN:'🛬',TH_WH:'🏢',DELIVERING:'🚚',DELIVERED:'📦'};
const STATUS_TEXT={NEW:'กำลังตรวจสอบ',QUOTED:'รอชำระเงิน',PAID:'ชำระเงินแล้ว',ORDERED:'สั่งซื้อกับร้านจีนแล้ว',SHIPPED:'กำลังจัดส่ง',DONE:'สำเร็จ',CANCELLED:'ยกเลิก'};

const me=JSON.parse(localStorage.getItem('opg_user')||'null');
if(me){ if(me.picture)$('#sbPic').src=me.picture; $('#sbName').textContent=me.name||me.email;
  fetch(`/api/topup?email=${encodeURIComponent(me.email.toLowerCase())}`).then(r=>r.json()).then(d=>{ $('#sbCredit').textContent='💰 '+fmt(d.credit||0)+' ฿';}).catch(()=>{}); }
$('#navToggle').addEventListener('click',()=>$('#sidebar').classList.toggle('open'));
$('#sbBd').addEventListener('click',()=>$('#sidebar').classList.remove('open'));

async function trackOrder(no){
  no=(no||'').trim().toUpperCase();
  $('#tAlert').style.display='none';
  if(!no){ $('#tAlert').textContent='กรุณากรอกเลขออเดอร์/Tracking';$('#tAlert').style.display='block';return; }
  $('#result').innerHTML='<div class="empty">กำลังค้นหา…</div>';
  let d=null;
  try{ const r=await fetch(`/api/orders/track?no=${encodeURIComponent(no)}`); d=await r.json(); }catch(e){}
  if(!d||!d.ok||!d.found){
    /* ไม่เจอออเดอร์ — ถ้าเป็นเลข Tracking ขนส่ง (ไม่ใช่เลข OP) ให้ค้นสดที่ 17track เลย */
    $('#result').innerHTML='';
    if(!no.startsWith('OP')){ show17track(no); return; }
    $('#tAlert').textContent='ไม่พบเลขออเดอร์/Tracking นี้'; $('#tAlert').style.display='block'; return;
  }
  const cur=d.shipStatus||'PENDING';
  const ci=SHIP_STEPS.indexOf(cur);
  const steps=SHIP_STEPS.map((s,i)=>`<div class="ship-step ${i<=ci?'on':''} ${i===ci?'now':''}"><div class="dot">${SHIP_ICON[s]}</div><div class="lbl">${SHIP_TEXT[s]}</div></div>`).join('');
  const tracking=Array.isArray(d.tracking)?d.tracking.slice().reverse():[];
  const tl=tracking.length
    ? `<div class="tl">${tracking.map(t=>`<div class="ev"><div class="st">${SHIP_ICON[t.step]||'📍'} ${esc(SHIP_TEXT[t.step]||t.step)}${t.location?' · '+esc(t.location):''}</div>${t.note?`<div class="nt">${esc(t.note)}</div>`:''}<div class="at">🕒 ${fmtDateTime(t.at)}</div></div>`).join('')}</div>`
    : `<div class="empty-tl">ทีมงานยังไม่ได้อัปเดตข้อมูลการขนส่ง</div>`;
  const total=Number(d.total)||0, ship=Number(d.shipping)||0, sum=total+ship;
  $('#result').innerHTML=`
    <div class="card" style="margin-top:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
        <div class="no" style="font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:20px;color:var(--brand-700)">${esc(d.orderNo)}</div>
        <div style="background:#fffbeb;color:#b45309;border:1px solid #fde68a;padding:4px 12px;border-radius:999px;font-size:12.5px;font-weight:600">● ${esc(STATUS_TEXT[d.status]||d.statusText||d.status)}</div>
      </div>
      <div class="row"><span class="k">วันที่สั่ง</span><span class="v">${fmtDateTime(d.createdAt)}</span></div>
      ${d.trackingNo?`<div class="row"><span class="k">เลข Tracking จีน</span><span class="v" style="font-family:'IBM Plex Mono',monospace">${esc(d.trackingNo)}</span></div>`:''}
      ${d.thTrackingNo?`<div class="row"><span class="k">เลขขนส่งไทย</span><span class="v" style="font-family:'IBM Plex Mono',monospace">${esc(d.thTrackingNo)}</span></div>`:''}
      ${total?`<div class="row"><span class="k">ราคาสินค้า</span><span class="v">${fmt(total)} ฿</span></div>`:''}
      ${ship?`<div class="row"><span class="k">ค่าจัดส่ง</span><span class="v">${fmt(ship)} ฿</span></div>`:''}
      ${sum?`<div class="row"><span class="k">รวมทั้งสิ้น</span><span class="v" style="font-size:16px;color:var(--brand-700)">${fmt(sum)} ฿</span></div>`:''}
      ${d.adminNote?`<div style="background:var(--brand-50);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:13.5px"><b>หมายเหตุจากร้าน:</b> ${esc(d.adminNote)}</div>`:''}
      <div class="ship-prog">
        <div style="font-weight:700;color:var(--brand-700);margin-bottom:10px">🚚 สถานะการขนส่ง — <span style="color:var(--brand-600)">${esc(SHIP_TEXT[cur])}</span></div>
        <div class="ship-steps">${steps}</div>
        ${tl}
      </div>
      <div style="margin-top:14px;text-align:right"><a href="po.html?no=${encodeURIComponent(d.orderNo)}" style="color:var(--brand-700);text-decoration:underline;font-weight:600;font-size:13.5px">📄 ดูใบสั่งซื้อ (PO)</a></div>
    </div>`;
  /* มีเลข Tracking จีน → แสดงสถานะสดจากขนส่งจีน (17track) */
  if(d.trackingNo) show17track(d.trackingNo);
}
$('#tBtn').addEventListener('click',()=>trackOrder($('#tInput').value));
$('#tInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();trackOrder($('#tInput').value);}});

/* รับ ?no= จาก URL */
const qs=new URLSearchParams(location.search);
if(qs.get('no')){ $('#tInput').value=qs.get('no'); trackOrder(qs.get('no')); }
</script>
</body>
</html>
